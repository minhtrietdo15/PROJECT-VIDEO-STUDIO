version: "3.8"

services:
  # ─── Frontend ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_started
    networks:
      - videostudio-network
    restart: unless-stopped

  # ─── Backend API ───────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql+asyncpg://videostudio:videostudio@postgres:5432/videostudio
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - project-data:/data/projects
      - ./src/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - videostudio-network
    restart: unless-stopped
    # GPU support (uncomment if using NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           capabilities: [gpu]

  # ─── Celery Worker ─────────────────────────
  celery-worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: dev
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql+asyncpg://videostudio:videostudio@postgres:5432/videostudio
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - project-data:/data/projects
      - ./src/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - videostudio-network
    restart: unless-stopped

  # ─── PostgreSQL Database ───────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=videostudio
      - POSTGRES_PASSWORD=videostudio
      - POSTGRES_DB=videostudio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - videostudio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videostudio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - videostudio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  project-data:
    driver: local

networks:
  videostudio-network:
    driver: bridge